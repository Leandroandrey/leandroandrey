name: generate animation

on:
  # Roda a cada 24 horas (todos os dias de madrugada)
  schedule:
    - cron: "0 0 * * *" 
  
  # Permite que você rode essa rotina manualmente na aba Actions
  workflow_dispatch:
  
  # Gera toda vez que houver um push na branch principal (a sua master ou main)
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera o arquivo da cobrinha com as estatisticas das suas contribuições
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Faz o push do arquivo svg gerado para o seu repositório (na branch "output")
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
